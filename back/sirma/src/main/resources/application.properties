spring.application.name=sirma
spring.profiles.active=dev

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/sirma?sslMode=VERIFY_IDENTITY
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuracion de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ======================================================================
# Configuracion de Mail Sender (contrase?a temporal)
# ======================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# URL del frontend para el boton del correo de bienvenida
app.login-url=${APP_LOGIN_URL:http://localhost:5173/login}

# URL base del frontend para enlaces de restablecimiento (ej: http://localhost:5173)
app.reset-base-url=${APP_RESET_BASE_URL:http://localhost:5173}

# ======================================================================
# Cloudinary ? subida de im?genes en la nube
# ======================================================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ======================================================================
# Multipart ? l?mite de tama?o para im?genes subidas
# ======================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ======================================================================
# Configuracion de JWT
# ======================================================================
jwt.secret=EstaEsUnaClaveSuperSecretaYDebeSerMuyLargaParaQueSeaSegura1234567890
jwt.expiration=3600000
#  ^ esa wea es en milisegundos XD, pero la ia me dijo que lo psuiera acį
#  |