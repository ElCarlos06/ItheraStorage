<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña - Activos 360</title>
  <style>
    @media screen and (max-width: 500px) {
      .stack-column { display: block !important; width: 100% !important; text-align: center !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc; font-family: 'DM Sans', Arial, sans-serif;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #f8fafc; padding: 20px 10px;">
  <tr>
    <td align="center">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 500px; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
        <tr>
          <td style="background-color: #717ff5; padding: 40px 20px;" align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td align="center">
                  <img src="cid:logo" alt="Activos 360" width="48" style="vertical-align: middle; margin-right: 10px;" />
                  <span style="font-size: 24px; font-weight: 900; color: #ffffff; vertical-align: middle;">Activos 360</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <tr>
          <td style="line-height: 0; background-color: #717ff5;">
            <img src="cid:onda" alt="" style="width: 100%; height: auto; display: block;" />
          </td>
        </tr>
        <tr>
          <td style="padding: 40px 30px;">
            <h1 style="margin: 0; font-size: 26px; font-weight: 700; color: #1e293b; text-align: center;">
              Restablecer contraseña
            </h1>
            <p style="margin: 16px 0 32px; font-size: 16px; color: #64748b; line-height: 24px; text-align: center;">
              Hola <span style="color: #6366f1;">{{nombre}}</span>, solicitaste restablecer tu contraseña. Haz clic en el botón para elegir una nueva.
            </p>
            <div align="center" style="margin: 32px 0;">
              <a href="{{resetLink}}" style="background-color: #3448f0; color: #ffffff; padding: 16px 32px; font-size: 16px; font-weight: 700; text-decoration: none; border-radius: 12px; display: inline-block;">
                Cambiar mi contraseña
              </a>
            </div>
            <p style="margin: 24px 0 0; font-size: 13px; color: #94a3b8; text-align: center;">
              Este enlace expira en 1 hora. Si no solicitaste este cambio, ignora este correo.
            </p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding: 25px; background-color: #f8fafc; border-top: 1px solid #e2e8f0;">
            <p style="margin: 0; font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase;">ITHERA SYSTEM</p>
            <p style="margin: 4px 0 0; font-size: 11px; color: #cbd5e1;">© 2026 Ithera Inc. • Activos 360</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
